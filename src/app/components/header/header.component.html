<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
  <div class="container">
    <!-- Logo and Brand -->
    <a class="navbar-brand d-flex align-items-center" routerLink="/">
      <img 
        src="/assets/logo.png" 
        alt="Football Fields Logo" 
        class="logo me-2"
        onerror="this.src='https://img.icons8.com/color/48/000000/football2--v1.png'">
      <span class="brand-text fw-bold">
        FOOTBALL<span class="text-warning">FIELDS</span>
      </span>
    </a>

    <!-- Mobile Menu Toggle -->
    <button 
      class="navbar-toggler" 
      type="button" 
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navigation Menu -->
    <div 
      class="collapse navbar-collapse" 
      [class.show]="isMenuOpen()"
      id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <!-- Home Link -->
        <li class="nav-item">
          <a 
            class="nav-link" 
            routerLink="/" 
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
            (click)="closeMenu()">
            <i class="bi bi-house-door me-1"></i>
            Accueil
          </a>
        </li>

        <!-- Fields Link -->
        <li class="nav-item">
          <a 
            class="nav-link" 
            routerLink="/fields" 
            routerLinkActive="active"
            (click)="closeMenu()">
            <i class="bi bi-grid-3x3-gap me-1"></i>
            Terrains
          </a>
        </li>

        @if (isAuthenticated()) {
          <!-- Reservations Link (Authenticated Users) -->
          <li class="nav-item">
            <a 
              class="nav-link" 
              routerLink="/reservations" 
              routerLinkActive="active"
              (click)="closeMenu()">
              <i class="bi bi-calendar-check me-1"></i>
              Mes Réservations
            </a>
          </li>

          @if (isAdmin()) {
            <!-- Admin Link -->
            <li class="nav-item">
              <a 
                class="nav-link" 
                routerLink="/admin" 
                routerLinkActive="active"
                (click)="closeMenu()">
                <i class="bi bi-speedometer2 me-1"></i>
                Admin
              </a>
            </li>
          }

          <!-- User Dropdown -->
          <li class="nav-item dropdown">
            <a 
              class="nav-link dropdown-toggle d-flex align-items-center" 
              href="#" 
              id="userDropdown" 
              role="button" 
              data-bs-toggle="dropdown" 
              aria-expanded="false">
              <div class="user-avatar me-2">
                {{ getUserInitials() }}
              </div>
              <span class="d-none d-lg-inline">
                {{ currentUser()?.firstName }}
              </span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
              <li>
                <a class="dropdown-item" routerLink="/profile" (click)="closeMenu()">
                  <i class="bi bi-person me-2"></i>
                  Mon Profil
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <a class="dropdown-item text-danger" href="#" (click)="logout(); closeMenu()">
                  <i class="bi bi-box-arrow-right me-2"></i>
                  Déconnexion
                </a>
              </li>
            </ul>
          </li>
        } @else {
          <!-- Login Button (Guest) -->
          <li class="nav-item">
            <a 
              class="nav-link" 
              routerLink="/login"
              (click)="closeMenu()">
              <i class="bi bi-box-arrow-in-right me-1"></i>
              Connexion
            </a>
          </li>

          <!-- Signup Button (Guest) -->
          <li class="nav-item">
            <a 
              class="btn btn-warning text-dark ms-lg-2 mt-2 mt-lg-0" 
              routerLink="/signup"
              (click)="closeMenu()">
              <i class="bi bi-person-plus me-1"></i>
              S'inscrire
            </a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
