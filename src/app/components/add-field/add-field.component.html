<div class="add-field-container py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-lg border-0">
          <div class="card-body p-5">
            <!-- Header -->
            <h2 class="fw-bold mb-4">
              <i class="bi bi-plus-circle me-2 text-primary"></i>
              Ajouter un Terrain
            </h2>

            <!-- Messages -->
            @if (errorMessage()) {
              <div class="alert alert-danger">{{ errorMessage() }}</div>
            }
            @if (successMessage()) {
              <div class="alert alert-success">{{ successMessage() }}</div>
            }

            <!-- Form -->
            <form (ngSubmit)="onSubmit()" #fieldForm="ngForm">
              <!-- Name -->
              <div class="mb-3">
                <label class="form-label fw-semibold">Nom du terrain</label>
                <input 
                  type="text" 
                  class="form-control"
                  [(ngModel)]="fieldData.name"
                  name="name"
                  required>
              </div>

              <!-- Type and Size -->
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold">Type</label>
                  <select 
                    class="form-select"
                    [(ngModel)]="fieldData.type"
                    name="type">
                    <option value="grass">Gazon naturel</option>
                    <option value="synthetic">Synthétique</option>
                  </select>
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold">Taille</label>
                  <select 
                    class="form-select"
                    [(ngModel)]="fieldData.size"
                    name="size">
                    <option value="5x5">5x5</option>
                    <option value="7x7">7x7</option>
                    <option value="11x11">11x11</option>
                  </select>
                </div>
              </div>

              <!-- Price and Status -->
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold">Prix par heure (DT)</label>
                  <input 
                    type="number" 
                    class="form-control"
                    [(ngModel)]="fieldData.pricePerHour"
                    name="pricePerHour"
                    min="50"
                    required>
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold">Statut</label>
                  <select 
                    class="form-select"
                    [(ngModel)]="fieldData.status"
                    name="status">
                    <option value="available">Disponible</option>
                    <option value="occupied">Occupé</option>
                    <option value="maintenance">Maintenance</option>
                  </select>
                </div>
              </div>

              <!-- Location -->
              <div class="mb-3">
                <label class="form-label fw-semibold">Localisation</label>
                <input 
                  type="text" 
                  class="form-control"
                  [(ngModel)]="fieldData.location"
                  name="location"
                  placeholder="Casablanca, Maarif"
                  required>
              </div>

              <!-- Description -->
              <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea 
                  class="form-control"
                  rows="3"
                  [(ngModel)]="fieldData.description"
                  name="description"
                  required></textarea>
              </div>

              <!-- Image URL -->
              <div class="mb-3">
                <label class="form-label fw-semibold">URL de l'image</label>
                <input 
                  type="url" 
                  class="form-control"
                  [(ngModel)]="fieldData.imageUrl"
                  name="imageUrl">
              </div>

              <!-- Amenities -->
              <div class="mb-4">
                <label class="form-label fw-semibold">Équipements</label>
                <div class="input-group mb-2">
                  <input 
                    type="text" 
                    class="form-control"
                    placeholder="Ajouter un équipement"
                    [(ngModel)]="newAmenity"
                    name="newAmenity"
                    (keyup.enter)="addAmenity()">
                  <button 
                    type="button"
                    class="btn btn-outline-primary"
                    (click)="addAmenity()">
                    <i class="bi bi-plus"></i>
                  </button>
                </div>

                <!-- Amenities List -->
                <div class="d-flex flex-wrap gap-2">
                  @for (amenity of fieldData.amenities; track $index) {
                    <span class="badge bg-primary-subtle text-primary px-3 py-2">
                      {{ amenity }}
                      <button 
                        type="button"
                        class="btn-close btn-close-sm ms-2"
                        (click)="removeAmenity($index)"></button>
                    </span>
                  }
                </div>
              </div>

              <!-- Submit Button -->
              <button 
                type="submit" 
                class="btn btn-primary w-100 py-2"
                [disabled]="fieldForm.invalid || isLoading()">
                @if (isLoading()) {
                  <span class="spinner-border spinner-border-sm me-2"></span>
                  Ajout en cours...
                } @else {
                  <i class="bi bi-check-circle me-2"></i>
                  Ajouter le terrain
                }
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
